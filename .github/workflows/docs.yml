name: Docs

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  links:
    name: docs canónicos + links relativos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verificar docs y links
        run: node .github/scripts/check-doc-links.mjs
